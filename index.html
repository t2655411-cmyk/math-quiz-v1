<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>一年级数学挑战营</title>
    <style>
        /* 教材风视觉设计 */
        body { 
            background-color: #FFFAF0; 
            font-family: "Helvetica Neue", Helvetica, Arial, "Microsoft YaHei", sans-serif; 
            display: flex; 
            justify-content: center; 
            padding: 20px;
            margin: 0;
        }
        .container { 
            max-width: 500px; 
            width: 100%;
            background: white; 
            padding: 30px; 
            border-radius: 30px; 
            border: 5px solid #FFD700; 
            box-shadow: 0 10px 0 #edc000; 
            box-sizing: border-box;
        }
        h1 { color: #FF8C00; text-align: center; font-size: 32px; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; font-size: 16px; }
        .question-item { 
            display: flex; 
            align-items: center; 
            padding: 15px 0; 
            border-bottom: 2px dashed #FFE4B5; 
            font-size: 28px; 
            color: #333;
        }
        .question-text { flex: 1; font-weight: bold; }
        input { 
            width: 85px; 
            height: 45px;
            font-size: 26px; 
            border: 3px solid #4CAF50; 
            border-radius: 12px; 
            text-align: center; 
            color: #2E8B57;
            outline: none;
        }
        .correct { background-color: #E8F5E9 !important; border-color: #4CAF50 !important; }
        .wrong { background-color: #FFEBEE !important; border-color: #F44336 !important; }
        .result-icon { width: 40px; text-align: center; font-size: 24px; margin-left: 10px; }
        button { 
            width: 100%; 
            padding: 15px; 
            font-size: 22px; 
            font-weight: bold;
            border: none; 
            border-radius: 15px; 
            cursor: pointer; 
            background: #4CAF50; 
            color: white; 
            box-shadow: 0 5px 0 #388E3C;
            margin-top: 30px;
        }
        #score-display { 
            display: none; 
            text-align: center; 
            margin-top: 20px; 
            padding: 15px;
            background: #FFF3E0;
            border-radius: 15px;
            font-size: 24px; 
            color: #E65100; 
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎒 数学小练习</h1>
    <p class="subtitle">小朋友，请认真填好每一个空格哦！</p>
    <div id="quiz-form"></div>
    <button onclick="calculateScore()">检查我的答案</button>
    <div id="score-display"></div>
</div>

<script>
    const myExampleQuestions = [
        { qText: "5 + 3 =", ans: 8 },
        { qText: "12 - 4 =", ans: 8 },
        { qText: "9 + ( ) = 15", ans: 6 },
        { qText: "2 + 3 + 4 =", ans: 9 },
        { qText: "20 - 10 =", ans: 10 },
        { qText: "( ) - 5 = 10", ans: 15 }
    ];

    function initQuiz() {
        const container = document.getElementById('quiz-form');
        myExampleQuestions.forEach((q, i) => {
            const div = document.createElement('div');
            div.className = 'question-item';
            div.innerHTML = `
                <span class="question-text">${q.qText}</span>
                <input type="number" class="answer-input" id="input-${i}">
                <div class="result-icon" id="icon-${i}"></div>
            `;
            container.appendChild(div);
        });
    }

    function calculateScore() {
        let score = 0;
        myExampleQuestions.forEach((q, index) => {
            const inputField = document.getElementById(`input-${index}`);
            const iconField = document.getElementById(`icon-${index}`);
            const userVal = parseInt(inputField.value);
            inputField.classList.remove('correct', 'wrong');
            if (userVal === q.ans) {
                score++;
                inputField.classList.add('correct');
                iconField.innerText = '✅';
            } else {
                inputField.classList.add('wrong');
                iconField.innerText = '❌';
            }
        });
        const scoreBox = document.getElementById('score-display');
        scoreBox.style.display = 'block';
        const finalScore = Math.round((score / myExampleQuestions.length) * 100);
        scoreBox.innerHTML = `<strong>得分：${finalScore}</strong>`;
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }

    initQuiz();
</script>
</body>
</html>
